[build]
  command = "pnpm run build"
  publish = "public" # This is for your frontend; if API-only, create an empty 'public' folder

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

  [[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

  [functions.api] # Replace 'api' with your function filename if different
  # This tells the bundler NOT to try to optimize these
  external_node_modules = ["@prisma/client", "prisma", "@prisma/adapter-pg", "pg"]
  # This ensures the engine files actually get moved to the server
  included_files = ["node_modules/.prisma/client/**"]