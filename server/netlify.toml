[build]
  command = "pnpm run build"
  publish = "public" # This is for your frontend; if API-only, create an empty 'public' folder

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

  [[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

  [functions.api] # Replace 'api' with your function filename if different
  external_node_modules = ["@prisma/client"]
  included_files = ["node_modules/.prisma/client/*.node"]